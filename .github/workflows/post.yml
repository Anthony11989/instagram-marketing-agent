name: Post to Instagram

on:
  workflow_dispatch:
    inputs:
      image:
        description: "Filename(s) in inbox/, comma-separated for a carousel (e.g. a.jpg,b.jpg)"
        required: true
      topic:
        description: "Direction / CTA for the caption"
        required: true
      overlay:
        description: "Draw text overlay on the images?"
        required: true
        type: choice
        default: "no"
        options:
          - "no"
          - "yes"

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests anthropic boto3 python-dotenv pillow

      - name: Generate, approve, publish
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          S3_PUBLIC_BASE: ${{ secrets.S3_PUBLIC_BASE }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python ig_agent.py "inbox/${{ inputs.image }}" "${{ inputs.topic }}" "${{ inputs.overlay }}"
